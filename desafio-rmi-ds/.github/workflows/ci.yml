name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install dbt-duckdb sqlfluff sqlfluff-templater-dbt ruff
          # Instala outras dependências caso existam
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run SQLFluff Linter
        run: sqlfluff lint models/ --dialect duckdb

      - name: Run dbt deps
        run: dbt deps --profiles-dir .
        working-directory: ./

      - name: Run dbt build (test and run in dev)
        run: dbt build --target dev --profiles-dir .
        working-directory: ./
