version: 2

models:
  - name: mart_educacao__absenteismo
    description: "Mart focado no absenteísmo crônico por escola e região. Responde à pergunta: 'Quais escolas/regiões têm maior taxa de alunos com frequência abaixo de 75%?'"
    config:
      materialized: table
      contract:
        enforced: true
    columns:
      - name: regiao
        data_type: varchar
        description: "Região da escola"
      - name: id_escola
        data_type: varchar
        description: "ID da escola"
        tests:
          - not_null
          - unique
      - name: total_alunos
        data_type: bigint
        description: "Total de alunos na escola"
      - name: alunos_absenteismo_cronico
        data_type: bigint
        description: "Quantidade de alunos com taxa de frequência abaixo de 75%"
      - name: taxa_absenteismo_cronico
        data_type: double
        description: "Proporção de alunos com absenteísmo crônico (alunos_absenteismo_cronico / total_alunos)"
